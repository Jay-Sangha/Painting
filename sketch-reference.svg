<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ccc" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="280" height="280" fill="#faf8f0"/>
  <rect width="280" height="280" fill="url(#grid)"/>
  <!-- Axes -->
  <line x1="140" y1="10" x2="140" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <line x1="10" y1="140" x2="270" y2="140" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <!-- Sky -->
  <polygon points="10,10 270,10 270,100 10,120" fill="#ffb366" opacity="0.6"/>
  <polygon points="10,120 270,100 270,160 10,150" fill="#9966cc" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="200" cy="75" r="22" fill="#ffdd44" stroke="#cc9900" stroke-width="1"/>
  <!-- Mountains -->
  <polygon points="10,160 80,90 120,160" fill="#4a5568"/>
  <polygon points="100,160 170,70 220,160" fill="#3d4f5f"/>
  <polygon points="180,160 270,100 270,160" fill="#354656"/>
  <!-- Ground -->
  <rect x="10" y="160" width="260" height="110" fill="#1a2a3a"/>
  <!-- Trees -->
  <polygon points="35,160 42,110 49,160" fill="#2d6b3a"/>
  <polygon points="55,160 62,95 69,160" fill="#256030"/>
  <!-- J -->
  <text x="75" y="95" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffd700">J</text>
  <!-- S -->
  <text x="115" y="95" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#ffd700">S</text>
  <text x="10" y="275" font-size="9" fill="#666">Paper sketch  Jayden Sangha (JS)  sunset scene</text>
</svg>
